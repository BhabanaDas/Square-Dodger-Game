<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Dodger! - My Canvas Game</title>
    
    <style>
        /* Quick and dirty reset to center everything nicely */
        body {
            background-color: #1a1a1a; /* dark mode by default */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* stop annoying scrollbars if layout shifts */
        }

        h1 {
            margin-bottom: 5px;
            font-size: 2rem;
            color: #00ff00; /* match the player color for theme symmetry */
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        /* Simple scoreboard wrapper */
        .score-container {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        #score {
            color: #FF4444; /* match enemy color to make it pop */
        }

        /* The actual game board box */
        #gameCanvas {
            background-color: #111111; /* slightly darker than body so it stands out */
            border: 4px solid #333333;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5);
            cursor: crosshair; /* looks cooler for an arcade game */
        }

        /* Small footer note */
        .controls-hint {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>
<body>

    <h1>SQUARE DODGER</h1>
    
    <div class="score-container">
        Score: <span id="score">0</span>
    </div>
    
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <div class="controls-hint">
        Move your mouse left and right to dodge!
    </div>

    <script src="game.js"></script>

</body>
</html>
